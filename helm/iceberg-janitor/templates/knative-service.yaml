{{- if .Values.knative.enabled }}
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{ include "iceberg-janitor.fullname" . }}
  labels:
    {{- include "iceberg-janitor.labels" . | nindent 4 }}
  annotations:
    autoscaling.knative.dev/min-scale: {{ .Values.knative.serving.minScale | quote }}
    autoscaling.knative.dev/max-scale: {{ .Values.knative.serving.maxScale | quote }}
    autoscaling.knative.dev/target: {{ .Values.knative.serving.target | quote }}
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "iceberg-janitor.name" . }}
      annotations:
        autoscaling.knative.dev/min-scale: {{ .Values.knative.serving.minScale | quote }}
        autoscaling.knative.dev/max-scale: {{ .Values.knative.serving.maxScale | quote }}
        autoscaling.knative.dev/target: {{ .Values.knative.serving.target | quote }}
    spec:
      containers:
        - image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.knative.serving.command | nindent 12 }}
          args:
            {{- toYaml .Values.knative.serving.args | nindent 12 }}
          ports:
            - containerPort: {{ .Values.knative.serving.containerPort }}
              protocol: TCP
          env:
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.s3.accessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.s3.secretAccessKey | quote }}
            - name: AWS_REGION
              value: {{ .Values.s3.region | quote }}
            - name: JANITOR_CONFIG_PATH
              value: {{ .Values.knative.serving.configPath | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/janitor
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "iceberg-janitor.fullname" . }}-config
{{- end }}
