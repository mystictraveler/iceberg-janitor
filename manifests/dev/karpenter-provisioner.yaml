---
# Karpenter NodePool for Flink TaskManager workloads.
#
# This provisions compute-optimized nodes on demand when Flink TaskManager pods
# are pending.  Idle nodes are consolidated and terminated after the TTL to
# minimise cost.

apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: flink-compaction
spec:
  template:
    metadata:
      labels:
        workload-type: flink-compaction
    spec:
      requirements:
        # Compute-optimized instances are ideal for Iceberg compaction (CPU + memory)
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - c5.xlarge
            - c5.2xlarge
            - c5.4xlarge
            - c6i.xlarge
            - c6i.2xlarge
            - c6i.4xlarge
            - c5a.xlarge
            - c5a.2xlarge
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
            - spot
      # Prefer spot instances for cost savings on batch compaction work
      nodeClassRef:
        name: flink-compaction

  # Limits — cap the total resources Karpenter can provision for this pool
  limits:
    cpu: "64"
    memory: "128Gi"

  # Disruption policy — how aggressively to reclaim idle capacity
  disruption:
    consolidationPolicy: WhenUnderutilized
    # Consolidate after pods are gone for 5 minutes
    consolidateAfter: 5m
    # Expire nodes after 24 hours to pick up new AMIs / instance types
    expireAfter: 24h

  # Weight relative to other NodePools (higher = preferred)
  weight: 50

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: flink-compaction
spec:
  amiFamily: AL2
  role: KarpenterNodeRole
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: iceberg-janitor
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: iceberg-janitor
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
  tags:
    project: iceberg-janitor
    component: flink-compaction
