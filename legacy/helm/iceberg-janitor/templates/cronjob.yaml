{{- if not .Values.knative.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "iceberg-janitor.fullname" . }}
  labels:
    {{- include "iceberg-janitor.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "iceberg-janitor.name" . }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: janitor
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["python", "-m", "iceberg_janitor.runner.cron"]
              args: ["--config", "/etc/janitor/config.yaml"]
              env:
                - name: AWS_ACCESS_KEY_ID
                  value: {{ .Values.s3.accessKeyId | quote }}
                - name: AWS_SECRET_ACCESS_KEY
                  value: {{ .Values.s3.secretAccessKey | quote }}
                - name: AWS_REGION
                  value: {{ .Values.s3.region | quote }}
              volumeMounts:
                - name: config
                  mountPath: /etc/janitor
                  readOnly: true
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: config
              configMap:
                name: {{ include "iceberg-janitor.fullname" . }}-config
{{- end }}
