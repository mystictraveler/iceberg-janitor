image:
  repository: iceberg-janitor
  tag: latest
  pullPolicy: IfNotPresent

# CronJob schedule (every 15 minutes) — used when knative.enabled is false
schedule: "*/15 * * * *"
concurrencyPolicy: Forbid
backoffLimit: 2
activeDeadlineSeconds: 600

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 1000m

# Catalog connection
catalog:
  name: default
  uri: http://rest-catalog:8181
  warehouse: s3://warehouse/
  type: rest
  properties:
    s3.endpoint: http://minio:9000

# S3/MinIO credentials
s3:
  accessKeyId: admin
  secretAccessKey: password
  region: us-east-1

# Maintenance policy
policy:
  defaultPolicy:
    maxSmallFileRatio: 0.3
    smallFileThresholdBytes: 8388608
    targetFileSizeBytes: 134217728
    maxFileCount: 10000
    maxSnapshots: 100
    snapshotRetentionHours: 168
    minSnapshotsToKeep: 5
    orphanRetentionHours: 72
    maxManifestCount: 500

  tableOverrides: {}
    # example:
    # default.high_volume_table:
    #   maxSmallFileRatio: 0.2
    #   maxSnapshots: 50

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 60s
  namespace: monitoring

# Knative configuration — when enabled, deploys a Knative Serving Service
# with event sources instead of a CronJob
knative:
  enabled: false

  serving:
    # Scale-to-zero annotations
    minScale: 0
    maxScale: 3
    target: 5
    # Container command
    command: ["uvicorn"]
    args:
      - "iceberg_janitor.api.app:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
    containerPort: 8080
    # Config path env var
    configPath: /etc/janitor/config.yaml

  pingsource:
    enabled: true
    schedule: "*/15 * * * *"
    data: '{"trigger": "scheduled", "scope": "all_tables"}'

  kafkasource:
    enabled: false
    bootstrapServers:
      - kafka:9092
    topics:
      - iceberg-commits
    consumerGroup: iceberg-janitor
