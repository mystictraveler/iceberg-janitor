---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: iceberg-janitor
  labels:
    app: query-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: iceberg-query-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8070
              name: http
              protocol: TCP
          env:
            - name: QUERY_SERVICE_PORT
              value: "8070"
            - name: DUCKDB_S3_ENDPOINT
              value: "minio:9000"
            - name: AWS_ACCESS_KEY_ID
              value: admin
            - name: AWS_SECRET_ACCESS_KEY
              value: password
            - name: AWS_REGION
              value: us-east-1
            - name: DUCKDB_S3_USE_SSL
              value: "false"
            - name: DUCKDB_S3_URL_STYLE
              value: path
            - name: DUCKDB_MEMORY_LIMIT
              value: "512MB"
            - name: DUCKDB_THREADS
              value: "4"
            - name: MAX_RESULT_ROWS
              value: "10000"
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 2000m
          readinessProbe:
            httpGet:
              path: /health
              port: 8070
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8070
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: iceberg-janitor
  labels:
    app: query-service
spec:
  selector:
    app: query-service
  ports:
    - name: http
      port: 8070
      targetPort: 8070
      protocol: TCP
