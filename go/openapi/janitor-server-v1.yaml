openapi: 3.1.0
info:
  title: iceberg-janitor (Go) — janitor-server HTTP API
  version: 0.4.0
  description: |
    HTTP adapter for the Go janitor's `pkg/janitor.Core` entry points.
    Same code path as `cmd/janitor-cli` (in-process mode) — both
    binaries call into the same shared library, the only difference is
    which process holds the warehouse credentials.

    ## Async job model

    All mutating maintenance operations
    (`/compact`, `/expire`, `/rewrite-manifests`, `/maintain`) are
    **asynchronous**. The handler returns **HTTP 202 Accepted** with
    a `Job` envelope containing a `job_id` immediately, and the
    actual work runs in a background goroutine on the server. Clients
    poll `GET /v1/jobs/{id}` to observe the job's lifecycle:
    `pending → running → completed | failed`. The `result` field is
    populated on completion with the operation-specific result
    document (CompactResult, ExpireResult, etc).

    ### Per-table in-flight dedup

    The server enforces a **per-(operation, table) in-flight guard**:
    if a maintain job is already running for a given table when a
    second client POSTs the same endpoint, the server returns **the
    EXISTING job's ID** (still HTTP 202) instead of spawning a
    duplicate. This prevents the self-collision pathology where two
    concurrent maintain jobs for the same table fight each other for
    the metadata.json CAS, exhaust their retry budgets, and mark
    partitions failed.

    The guard works in two layers:

    1. **In-process map** (load-bearing for single-replica deployments).
       The jobStore tracks the running job per (operation, table)
       pair under a mutex. Same-replica concurrent POSTs dedup
       instantly without touching the warehouse.

    2. **S3-backed lease** (load-bearing for multi-replica deployments).
       Before spawning a job, the server CAS-creates a lease file at
       `_janitor/state/leases/<ns>.<table>/<op>.lease` via
       `gocloud.dev/blob.NewWriter(IfNotExist: true)`. Other replicas
       see the lease and return the existing job's ID. The lease
       primitive is in `pkg/lease`; the conditional create maps to
       S3's `If-None-Match: *` for genuine cross-process atomicity.

    Persistent job records live at
    `_janitor/state/jobs/<job_id>.json` so any replica can answer
    `GET /v1/jobs/{id}` regardless of which replica is doing the
    work. The local in-process job map serves as a fast-path cache;
    cache miss falls back to a warehouse read.

    ## Auth model

    The server itself does **NOT** enforce identity. Auth is delegated
    to the deployment platform:

    - **Knative + Kourier**: front the service with an authenticated
      ingress (oauth2-proxy, Kourier+JWT, Istio AuthN policy)
    - **AWS Lambda**: front with API Gateway + Cognito or IAM auth
    - **Self-hosted**: front with nginx/envoy + your auth provider

    This matches Knative conventions and keeps the server's surface
    minimal. The server trusts the platform to have authenticated the
    caller.

    ## Multi-cloud

    The server uses `gocloud.dev/blob` so the same binary serves an
    S3 / MinIO / GCS / Azure Blob / local-filesystem warehouse. Backend
    selection is purely a function of the `JANITOR_WAREHOUSE_URL` env
    var the server was started with. There is no per-cloud build.

    ## Relationship to the Iceberg REST Catalog spec

    This is **NOT** a re-implementation of the Iceberg REST Catalog
    spec (`iceberg-open-api`). The intended overlap is small — see
    `go/openapi/iceberg-overlap.md` for the full discussion. TL;DR:
    Iceberg REST Catalog is a **catalog protocol** (load tables, commit
    metadata, list namespaces); the janitor is a **maintenance
    operator** that reads + writes tables but does not provide a
    catalog service. The janitor explicitly takes the no-catalog-service
    architectural position: the Iceberg metadata files in object
    storage ARE the catalog.

  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: iceberg-janitor
    url: https://github.com/mystictraveler/iceberg-janitor

servers:
  - url: http://localhost:8080
    description: local development (file:// or MinIO warehouse)

tags:
  - name: health
    description: Liveness and readiness probes (Kubernetes / Knative)
  - name: catalog
    description: Read-only catalog operations (no auth required for read-only roles)
  - name: maintenance
    description: Mutating maintenance operations (require warehouse-write IAM on the server)

paths:
  /v1/healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: |
        Returns 200 if the server process is running and the catalog
        connection was successfully opened at startup. Does NOT touch
        the warehouse — this is a cheap process-level check suitable
        for Kubernetes `livenessProbe`.
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required: [status, uptime_seconds, warehouse]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  uptime_seconds:
                    type: number
                    format: double
                  warehouse:
                    type: string
                    description: The configured JANITOR_WAREHOUSE_URL

  /v1/readyz:
    get:
      tags: [health]
      summary: Readiness probe (warehouse-reachable)
      description: |
        Returns 200 if the server can list the warehouse root prefix.
        Returns 503 if the warehouse is unreachable. Use as the
        Kubernetes `readinessProbe` so Knative removes the pod from
        rotation when the underlying object store is having an outage.
      responses:
        '200':
          description: Warehouse reachable
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ready]
        '503':
          description: Warehouse unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tables:
    get:
      tags: [catalog]
      summary: List Iceberg tables in the warehouse
      description: |
        Walks the warehouse object store and returns every directory
        that contains a `metadata/v*.metadata.json` file. This is the
        directory-catalog discovery primitive — no catalog service is
        consulted.

        Tables are identified by their `Prefix` (bucket-relative path,
        e.g. `mvp.db/events`). The `CurrentMetadata` field is the
        bucket-relative path to the highest-numbered metadata.json file.

        For very large warehouses, pass `?prefix=` to scope the walk
        to a subtree.
      parameters:
        - name: prefix
          in: query
          required: false
          schema:
            type: string
          description: Optional bucket-relative prefix to scope the discovery
      responses:
        '200':
          description: List of discovered tables
          content:
            application/json:
              schema:
                type: object
                required: [count, tables]
                properties:
                  count:
                    type: integer
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/TableLocation'

  /v1/tables/{namespace}/{name}/health:
    get:
      tags: [catalog]
      summary: Compute a HealthReport for a single table
      description: |
        Loads the table via the directory catalog and returns the
        analyzer's HealthReport. This is read-only — no commits, no
        modifications. Suitable for `read-only` operator roles.

        The report includes the H1 metadata-to-data ratio (CB3, the
        crown axiom: metadata bytes should never exceed a small fraction
        of data bytes). When the ratio is critical, the analyzer marks
        the table as needing attention but does not act.
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/TableName'
      responses:
        '200':
          description: HealthReport
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthReport'
        '404':
          description: Table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tables/{namespace}/{name}/compact:
    post:
      tags: [maintenance]
      summary: Compact a table (async)
      description: |
        Spawns a background goroutine to rewrite the table's small
        files into target-sized files via the byte-copy stitch path
        (`pkg/janitor.Compact`), runs the mandatory pre-commit master
        check, and commits via the directory catalog's atomic CAS path.

        Returns **HTTP 202 Accepted** with a `Job` envelope. Poll
        `GET /v1/jobs/{id}` for status. On completion, the job's
        `result` field contains a `CompactResult`.

        ### Per-table in-flight dedup

        If a compact job is already running for this table, the
        server returns the **existing** job's ID (still 202) instead
        of spawning a duplicate. See the API description for the
        full lease + persistent jobrecord protocol.

        ### Master check is mandatory and per-commit

        Every CAS commit goes through `safety.VerifyCompactionConsistency`
        which validates invariants I1-I9 (row count, schema, per-column
        value/null counts, bounds presence, manifest references). The
        check is non-bypassable. Failures are recorded in the job's
        `result.verification` field with the failing invariant.
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/TableName'
        - in: query
          name: partition
          required: false
          schema:
            type: string
          description: |
            Optional partition scope, formatted as `col=value`. When
            set, compaction only touches files in that partition. The
            in-flight dedup key is still per-table, not per-partition.
        - in: query
          name: target_file_size
          required: false
          schema:
            type: string
          description: |
            Pattern B threshold for the skip-already-large-files filter.
            Accepts byte counts or human-readable sizes (e.g. `1MB`,
            `64MB`, `1GB`). Files at or above this size are kept in
            place; only the small-file tail is rewritten.
        - $ref: '#/components/parameters/DryRun'
      responses:
        '202':
          description: Compact job accepted (or in-flight dedup hit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error (lease acquire failure, etc)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tables/{namespace}/{name}/maintain:
    post:
      tags: [maintenance]
      summary: Run the full maintain pipeline (async, zero-knob)
      description: |
        The **load-bearing entry point** for the janitor. Runs:

          1. **expire** — drop snapshots beyond keep_last / keep_within
          2. **rewrite-manifests** (pre-compact) — fold per-commit
             micro-manifests into partition-organized layout
          3. **compact** — dispatched per the workload classifier:
             - `streaming → hot` ⇒ `pkg/janitor.CompactHot` parallel
               delta-stitch with single-snapshot batched commit
             - `batch | slow_changing | dormant → cold` ⇒
               `pkg/janitor.CompactCold` per-partition trigger-based
               full compact
             - explicit `?mode=full` override ⇒ `pkg/janitor.CompactTable`
          4. **rewrite-manifests** (post-compact) — fold the new
             commit's micro-manifest back into the partition layout

        ### Zero-knob

        The handler classifies the table on every call by reading
        the snapshot history (`pkg/strategy/classify.Classify`) and
        maps the resulting `WorkloadClass` to a `MaintainOptions`
        struct via `ClassToOptions`. Callers pass nothing; the server
        decides mode and per-class thresholds. The optional `?mode=`
        query param exists for testing and is not part of normal
        operation.

        ### In-flight dedup applies

        Concurrent maintain POSTs for the same table return the
        existing job's ID (HTTP 202). Run-18 surfaced the
        self-collision pathology where two duplicate maintain jobs
        on the same table fought for the metadata.json CAS — the
        in-flight guard prevents this.
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/TableName'
        - in: query
          name: mode
          required: false
          schema:
            type: string
            enum: [hot, cold, full]
          description: |
            Override for the classifier-derived mode. Reserved for
            testing and operator one-offs; production callers should
            leave this unset.
        - $ref: '#/components/parameters/DryRun'
      responses:
        '202':
          description: Maintain job accepted (or in-flight dedup hit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tables/{namespace}/{name}/expire:
    post:
      tags: [maintenance]
      summary: Expire old snapshots (async)
      description: |
        Spawns a background goroutine to drop snapshots beyond
        `keep_last` / `keep_within` from the table's parent chain.
        The current snapshot is always retained. Master check
        (different invariants from compact: row count of CURRENT
        snapshot must not change; snapshot set must be a subset of
        the input; current snapshot id must not change) runs
        per-commit and is non-bypassable.

        In-flight dedup applies per (operation=expire, table).
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/TableName'
        - in: query
          name: keep_last
          required: false
          schema:
            type: integer
            minimum: 1
            default: 5
          description: Minimum number of recent snapshots to retain
        - in: query
          name: keep_within
          required: false
          schema:
            type: string
          description: |
            Go duration string (e.g. `24h`, `7d` is not valid use
            `168h`). Snapshots older than this are eligible for
            removal subject to keep_last.
        - $ref: '#/components/parameters/DryRun'
      responses:
        '202':
          description: Expire job accepted (or in-flight dedup hit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tables/{namespace}/{name}/rewrite-manifests:
    post:
      tags: [maintenance]
      summary: Rewrite manifests into partition-organized layout (async)
      description: |
        Spawns a background goroutine that consolidates per-commit
        micro-manifests into a partition-organized layout. After this
        op, the next compact's manifest walk reads dramatically
        fewer manifests because each manifest's bounds are tighter.

        Master check guarantees data file count + row count are
        unchanged across the rewrite. In-flight dedup applies per
        (operation=rewrite-manifests, table).
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/TableName'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '202':
          description: Rewrite-manifests job accepted (or in-flight dedup hit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/jobs/{id}:
    get:
      tags: [maintenance]
      summary: Poll an async job's status
      description: |
        Returns the current status of a job created by any of the
        async maintenance endpoints. The same job ID is observable
        from any replica because job records live on the warehouse
        object store at `_janitor/state/jobs/<job_id>.json`.

        ### Status lifecycle

        ```
        pending  → job created, goroutine has not started yet
        running  → goroutine is processing
        completed → result field is populated
        failed    → error field is populated
        ```

        Clients should poll until status reaches `completed` or
        `failed`. Recommended poll interval: 1-5 seconds for fast
        operations, 10-30 seconds for long-running maintain jobs.

        ### Cross-replica reads

        Any replica in the cluster can answer this endpoint for any
        job, not just the replica that owns the job's lease. The
        replica's local jobStore acts as a fast-path cache; cache
        miss falls back to a warehouse read of the job record.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: The `job_id` returned by an async POST endpoint.
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found (id is unknown OR record was garbage-collected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    Namespace:
      name: namespace
      in: path
      required: true
      schema:
        type: string
      description: |
        Iceberg namespace, with or without the `.db` suffix iceberg-go
        uses for default location-provider paths. e.g. `mvp` or `mvp.db`.

    TableName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Table name (no namespace prefix)

    DryRun:
      name: dry_run
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: |
        When `true`, the server runs the operation's full planning
        phase (manifest walk, entry grouping, transaction staging,
        master check where applicable), then **stops before any
        side effects** — no parquet / manifest files are written
        and no commit happens.

        The response body's `result` field carries the operation's
        usual `CompactResult` / `CompactHotResult` / `ExpireResult` /
        `RewriteManifestsResult` / `MaintainResult` populated with:

          - `dry_run: true` — echoes the request flag so the client
            can't mistake a dry-run result for a real run
          - `contention_detected: <bool>` — the server reloaded the
            table at the end of the planning phase and compared its
            current snapshot id to the pre-walk value. If they
            differ, a foreign writer committed during the plan, and
            a real run would have hit a CAS conflict (expect retry
            spin or a partial-success outcome if run immediately)
          - projected `after_*` counts (file count, row count, etc.)
            computed from the staged / grouped state — no second
            round-trip
          - `partitions_planned` (CompactHot only) — the set the
            real run would stitch, with each entry's
            `stitched=false, dry_run=true`

        Use-case: operator sanity check before a risky maintain run,
        CI gating on "would this diverge from a known-good state",
        or dashboards that want a continuous "compactable-small-file
        tail" estimate without paying the commit cost.

        Dry-run forwards through `/maintain` to every sub-op (expire,
        pre-rewrite, compact [hot|cold|full], post-rewrite), so one
        call gives an end-to-end projection of the full pipeline.

  schemas:
    Job:
      type: object
      description: |
        Async job envelope returned by `/compact`, `/maintain`,
        `/expire`, `/rewrite-manifests`, and `/v1/jobs/{id}`. The
        `result` field is populated on completion with the
        operation-specific result document (CompactResult,
        ExpireResult, RewriteManifestsResult, or MaintainResult).

        Backed by a persistent record at
        `_janitor/state/jobs/<job_id>.json` so any replica can read
        it. The local jobStore caches the record; cache miss falls
        back to a warehouse read.
      required: [job_id, status, table, operation, created_at]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        table:
          type: string
          description: "Fully-qualified table name in the form `<namespace>.<table>`"
          example: tpcds.store_sales
        operation:
          type: string
          enum: [compact, maintain, expire, rewrite-manifests]
        created_at:
          type: string
          format: date-time
        done_at:
          type: string
          format: date-time
          description: Wall-clock time the job completed (or failed). Absent while running.
        result:
          type: object
          description: |
            Operation-specific result document. Schema depends on
            `operation`:
              - `compact`           → CompactResult
              - `maintain`          → MaintainResult (envelopes the
                                       expire/rewrite/compact sub-results
                                       and the per-step `steps_completed`
                                       list)
              - `expire`            → ExpireResult
              - `rewrite-manifests` → RewriteManifestsResult
            Absent until status reaches `completed`.
        error:
          type: string
          description: |
            Failure reason. Set when status is `failed`. Master check
            failures, CAS exhaustion, lease acquire failures, and
            other terminal errors all surface here.
        owner:
          type: string
          description: |
            Identity of the server replica that owns the lease for
            this job. Format: `<hostname>:<pid>:<startup-uuid>`. Used
            by operators for replica-attribution debugging. Empty
            when the server runs in legacy in-process-only mode
            (no warehouse-backed lease).
          example: janitor-server-7c9d8f6b9d-x4w2k:1:8f3e2c4a-...

    TableLocation:
      type: object
      required: [Prefix, CurrentMetadata, CurrentVersion]
      properties:
        Prefix:
          type: string
          description: Bucket-relative path of the table directory
          example: mvp.db/events
        CurrentMetadata:
          type: string
          description: Bucket-relative path to the highest-numbered metadata.json
          example: mvp.db/events/metadata/00015-deadbeef-...metadata.json
        CurrentVersion:
          type: integer
          description: Integer version parsed from the metadata.json filename
          example: 15

    HealthReport:
      type: object
      description: Output of pkg/analyzer.Assess
      properties:
        TableLocation:
          type: string
        TableUUID:
          type: string
          format: uuid
        FormatVersion:
          type: integer
          description: Iceberg table format version (1, 2, or 3)
        CurrentSnapshotID:
          type: integer
          format: int64
        SnapshotCount:
          type: integer
        LiveSnapshotCount:
          type: integer
        LastUpdatedMillis:
          type: integer
          format: int64
        DataFileCount:
          type: integer
        DataBytes:
          type: integer
          format: int64
        TotalRowCount:
          type: integer
          format: int64
        SmallFileThreshold:
          type: integer
          format: int64
          description: Per-file size below which a file counts as "small"
        SmallFileCount:
          type: integer
        SmallFileBytes:
          type: integer
          format: int64
        SmallFileRatio:
          type: number
          format: double
          minimum: 0
          maximum: 1
        ManifestCount:
          type: integer
        ManifestBytes:
          type: integer
          format: int64
        AvgManifestBytes:
          type: integer
          format: int64
        MetadataBytes:
          type: integer
          format: int64
        MetadataDataRatio:
          type: number
          format: double
          description: |
            **The H1 axiom (CB3).** Metadata bytes divided by data
            bytes. Healthy < 5%, warning at 5-10%, CRITICAL > 10%.
            When this exceeds the critical threshold, the janitor
            refuses to add more metadata to the table — it switches
            to metadata-shrinking mode (expire + manifest rewrite).
        IsHealthy:
          type: boolean
        NeedsAttention:
          type: boolean
        IsCritical:
          type: boolean
        AttentionReason:
          type: string

    CompactRequest:
      type: object
      description: |
        Request body for POST /v1/tables/{ns}/{name}/compact. All
        fields optional in the MVP. Future iterations will add
        partition_filter, since_snapshot, target_file_size_bytes,
        force, dry_run, etc.
      properties:
        max_attempts:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
          description: CAS-retry cap before giving up
        initial_backoff_ms:
          type: integer
          minimum: 1
          default: 100
          description: First-retry wait, doubles each attempt

    CompactResult:
      type: object
      required: [identifier, attempts, before_files, after_files, verification]
      properties:
        identifier:
          type: array
          items:
            type: string
          example: [mvp, events]
        attempts:
          type: integer
          description: Number of CAS attempts (1 on the happy path)
        before_snapshot_id:
          type: integer
          format: int64
        before_files:
          type: integer
        before_bytes:
          type: integer
          format: int64
        before_rows:
          type: integer
          format: int64
        after_snapshot_id:
          type: integer
          format: int64
        after_files:
          type: integer
        after_bytes:
          type: integer
          format: int64
        after_rows:
          type: integer
          format: int64
        verification:
          $ref: '#/components/schemas/Verification'
        duration_ms:
          type: integer
          format: int64

    Verification:
      type: object
      description: |
        Output of pkg/safety.VerifyCompactionConsistency. Implemented
        invariants: I1 (row count), I2 (schema by id), I3 (per-column
        value count), I4 (per-column null count), I5 (per-column bounds
        presence), I7 (manifest reference existence). I6 (V3 row
        lineage), I8 (manifest set equality), I9 (content hash) land
        alongside the maintenance ops that need them.

        This record is committed to the Iceberg snapshot summary so
        it's queryable forever via `<table>.snapshots`.
      required: [scheme_version, checked_at, checker_version, overall]
      properties:
        scheme_version:
          type: integer
          example: 1
        checked_at:
          type: string
          format: date-time
        checker_version:
          type: string
          example: iceberg-janitor-go MVP
        input_snapshot_id:
          type: integer
          format: int64
        output_snapshot_id:
          type: integer
          format: int64
        I1_row_count:
          type: object
          properties:
            in: { type: integer, format: int64 }
            dvs: { type: integer, format: int64 }
            out: { type: integer, format: int64 }
            result: { type: string, enum: [pass, fail] }
            reason: { type: string }
        I2_schema:
          type: object
          properties:
            in_id: { type: integer }
            out_id: { type: integer }
